name: Automatic building of docker image
on:
  schedule:
    - cron: "*/20 * * * *"
  push:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'FiveM build number (e.g., 12345)'
        required: true
        type: number
jobs:
  auto-build:
    runs-on: ubuntu-latest
    steps:
      - id: latest-fivem-tag
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          echo tag=$(curl -fH "Accept: application/vnd.github.v3+json" --url "https://api.github.com/repos/citizenfx/fivem/tags?per_page=100" | jq -r 'first(.[] | {name: .name | match("v1.0.0.(\\d+)").captures | .[].string}).name') >> $GITHUB_OUTPUT
      - id: set-build-number
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.build_number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.latest-fivem-tag.outputs.tag }}" >> $GITHUB_OUTPUT
          fi
      - id: docker-image
        if: ${{ steps.set-build-number.outputs.tag != null }}
        run: |
          echo exists=$(curl -s "https://hub.docker.com/v2/repositories/traskin/fxserver/tags/${{ steps.set-build-number.outputs.tag }}/" | jq '.last_updated != null') >> $GITHUB_OUTPUT
      - id: fxserver-artifact
        if: ${{ steps.docker-image.outputs.exists == 'false' }}
        run: |
          echo response=$(curl -s --head -w %{http_code} https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master/$(curl -sH "Accept: application/vnd.github.v3+json" --url "https://api.github.com/repos/citizenfx/fivem/tags?per_page=100" | jq -r 'first(.[] | {name: .name | match("v1.0.0.(${{ steps.set-build-number.outputs.tag }})").captures | .[].string, hash: .commit.sha} | join("-"))')/fx.tar.xz -o /dev/null) >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        if: ${{ steps.fxserver-artifact.outputs.response == '200' }}
      - id: check-is-latest
        if: ${{ steps.fxserver-artifact.outputs.response == '200' }}
        run: |
          latest_build=$(curl -sH "Accept: application/vnd.github.v3+json" --url "https://api.github.com/repos/citizenfx/fivem/tags?per_page=100" | jq -r 'first(.[] | {name: .name | match("v1.0.0.(\\d+)").captures | .[].string}).name')
          if [ "${{ steps.set-build-number.outputs.tag }}" = "$latest_build" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi
      - uses: docker/login-action@v3
        if: ${{ steps.fxserver-artifact.outputs.response == '200' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: set-docker-tags
        if: ${{ steps.fxserver-artifact.outputs.response == '200' }}
        run: |
          tags="traskin/fxserver:${{ steps.set-build-number.outputs.tag }}"
          if [ "${{ steps.check-is-latest.outputs.is_latest }}" = "true" ]; then
            tags="${tags}
          traskin/fxserver:latest"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$tags" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        if: ${{ steps.fxserver-artifact.outputs.response == '200' }}
        with:
          push: true
          build-args: |
            artifact=${{ steps.set-build-number.outputs.tag }}
          tags: ${{ steps.set-docker-tags.outputs.tags }}
